name: CI

# Build + lint + type check. Deploys are handled natively by Netlify's
# GitHub integration (Netlify rebuilds on every push to main).
#
# History note: this workflow previously tried to deploy via
# `netlify deploy --dir=.next --prod` which does NOT work for SSR
# Next.js apps using @netlify/plugin-nextjs — the plugin needs to run
# during Netlify's own build to transform output into Functions. The
# deploy + notify-failure jobs were removed; trust Netlify for deploys.

on:
  push:
    branches:
      - main
      - staging
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Server-side secrets (empty when unset — code handles missing config gracefully)
          N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}
          N8N_WEBHOOK_SECRET: ${{ secrets.N8N_WEBHOOK_SECRET }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          WAHA_BASE_URL: ${{ secrets.WAHA_BASE_URL }}
          WAHA_API_KEY: ${{ secrets.WAHA_API_KEY }}
          WAHA_TO_NUMBER: ${{ secrets.WAHA_TO_NUMBER }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_LEADS_DATABASE_ID: ${{ secrets.NOTION_LEADS_DATABASE_ID }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          # Public vars: hardcoded fallback so the build works even before repo Variables are set
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://proto-model.com' }}
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ vars.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME || 'placeholder' }}
