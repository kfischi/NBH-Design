name: PR Checks

on:
  pull_request:
    branches:
      - main
      - staging

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check:
    name: Lint · Build · Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build (dry run)
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: https://proto-model.com
          NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: placeholder

      - name: Comment build status on PR
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}';
            const icon = status === 'success' ? '✅' : '❌';
            const msg = status === 'success'
              ? `${icon} Build passed — ready to merge`
              : `${icon} Build failed — check the logs before merging`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: msg
            });
