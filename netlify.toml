# ── Netlify Configuration ────────────────────────────────────────────
[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"

# ── Next.js plugin (required for SSR/API routes) ─────────────────────
[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Security headers ─────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy  = """
      default-src 'self';
      script-src  'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com;
      style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src    'self' https://fonts.gstatic.com;
      img-src     'self' data: https://res.cloudinary.com https://www.googletagmanager.com;
      media-src   'self' https://res.cloudinary.com;
      frame-src   https://www.googletagmanager.com;
      connect-src 'self' https://*.netlify.com https://www.google-analytics.com https://analytics.google.com https://www.googletagmanager.com https://res.cloudinary.com;
    """

# ── Branch deploy settings ────────────────────────────────────────────
[context.production]
  command = "npm run build"

[context.staging]
  command = "npm run build"

[context.deploy-preview]
  command = "npm run build"
