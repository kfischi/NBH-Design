<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MULTI BRAWN - המדריך הדיגיטלי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; background-color: #ffffff; overflow-x: hidden; margin: 0; padding: 0; }
        .gift-container { perspective: 1000px; cursor: pointer; transition: transform 0.6s ease; }
        .gift-box { width: 220px; height: 220px; background: #e91e63; position: relative; transform-style: preserve-3d; transition: transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin: 0 auto; box-shadow: 0 20px 40px rgba(0,0,0,0.15); }
        .gift-lid { position: absolute; width: 240px; height: 50px; background: #c2185b; top: -10px; left: -10px; transform: translateZ(20px); transition: 0.8s all ease; z-index: 10; border: 1px solid rgba(255,255,255,0.2); }
        .ribbon-v { position: absolute; width: 40px; height: 100%; background: #ffffff; left: 50%; transform: translateX(-50%); opacity: 0.95; }
        .ribbon-h { position: absolute; width: 100%; height: 40px; top: 50%; transform: translateY(-50%); background: #ffffff; opacity: 0.95; }
        .box-open .gift-lid { transform: translateY(-150px) rotateX(45deg); opacity: 0; }
        .box-open .gift-box { transform: scale(0); opacity: 0; pointer-events: none; }
        .content-card { opacity: 0; transform: translateY(30px); transition: all 0.5s ease; display: none; }
        .content-card.active { opacity: 1; transform: translateY(0); display: block; }
        .glass-effect { background: #ffffff; border: 2px solid #e91e63; box-shadow: 0 15px 35px rgba(233, 30, 99, 0.1); }
        .multi-brawn-title { font-weight: 900; letter-spacing: 3px; color: #1a1a1a; text-transform: uppercase; }
        .progress-dot { width: 8px; height: 8px; border-radius: 50%; background: #eee; transition: 0.3s; }
        .progress-dot.active { background: #e91e63; transform: scale(1.2); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-[100dvh] p-6">
    <div id="giftWrapper" class="text-center">
        <h2 class="multi-brawn-title text-3xl mb-12">MULTI BRAWN</h2>
        <div class="gift-container" onclick="openGift()">
            <div class="gift-box" id="mainBox">
                <div class="gift-lid"></div>
                <div class="ribbon-v"></div>
                <div class="ribbon-h"></div>
            </div>
        </div>
        <p class="mt-12 text-gray-400 animate-pulse font-light text-lg italic">לחצי על המארז לגילוי המדריך</p>
    </div>
    <div id="guideContent" class="w-full max-w-md hidden">
        <div class="text-center mb-8">
            <h1 class="multi-brawn-title text-2xl">MULTI BRAWN</h1>
            <p class="text-[10px] text-pink-600 font-bold uppercase tracking-[0.3em] mt-1">L O C A T I O N S</p>
        </div>
        <div class="glass-effect rounded-[2.5rem] p-10 relative min-h-[480px] flex flex-col justify-between">
            <div id="slidesContainer"></div>
            <div class="flex justify-between items-center mt-10 border-t border-gray-100 pt-8">
                <button onclick="prevStep()" id="prevBtn" class="text-gray-300 hover:text-pink-600 transition disabled:opacity-0">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <div class="flex gap-2" id="dotsContainer"></div>
                <button onclick="nextStep()" id="nextBtn" class="bg-pink-600 text-white p-4 rounded-full hover:bg-pink-700 shadow-xl transition transform active:scale-90">
                    <svg id="nextIcon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                </button>
            </div>
        </div>
    </div>
    <script>
        let currentStep = 0;
        const steps = [
            { t: "ברוכה הבאה לעולם של MULTI BRAWN", c: "המדריך המלא למציאת הלוקיישן המושלם לאירוע שלך מתחיל עכשיו." },
            { t: "למה לוקיישן זה הכל?", c: "המקום הוא הנשמה של האירוע. הוא קובע את האווירה, את התמונות ואת הזיכרון." },
            { t: "אנחנו לא מפיקים - אנחנו מחברים", c: "MULTI BRAWN מתמחה בפתרונות לוקיישן מדויקים לכל סוג של אירוע." },
            { t: "שלב 1: הגדרת חזון", c: "לפני הכל - מה הווייב? אורבני, כפרי, יוקרתי או אינטימי?" },
            { t: "שלב 2: כמות אורחים", c: "אל תתפשרי על מקום גדול מדי או צפוף מדי. הדיוק הוא המפתח." },
            { t: "וילות יוקרה", c: "הפתרון האידיאלי לשבתות חתן ואירועי בוטיק בלתי נשכחים." },
            { t: "צימרים נבחרים", c: "למי שמחפשת שקט, רמה גבוהה וחיבור לטבע." },
            { t: "שבת חתן בסטנדרט אחר", c: "אנחנו מוצאים לך את המקום שיגרום לכל המשפחה להרגיש בבית מלון." },
            { t: "אטרקציות ותוכן", c: "לוקיישן טוב צריך תוכן מעולה. אנחנו מחברים ביניהם." },
            { t: "הסוד הוא בפרטים הקטנים", c: "תאורה, גישה לנכים, חניה - אנחנו בודקים הכל עבורך." },
            { t: "פתרונות לכל תקציב", c: "יוקרה היא לא רק מחיר, היא שירות ואיכות ללא פשרות." },
            { t: "קהילה חזקה", c: "הכוח שלנו הוא בקידום קהילות וקבוצות ברשתות החברתיות." },
            { t: "חשיפה מקסימלית", c: "אנחנו יודעים להביא את הלוקיישן שלך לקהל הנכון ביותר." },
            { t: "לידים איכותיים", c: "המטרה שלנו היא לא רק צפיות, אלא לקוחות שסוגרים." },
            { t: "ליווי אישי", c: "ב-MULTI BRAWN את לעולם לא לבד בתהליך החיפוש." },
            { t: "מקצועיות ללא פשרות", c: "כל לוקיישן במאגר שלנו נבדק ונבחר בקפידה." },
            { t: "חדשנות בשיווק", c: "אנחנו משתמשים בכלים המתקדמים ביותר כדי לקדם את התחומים שלנו." },
            { t: "מולטי בראון זה מותג", c: "כשאת בוחרת בנו, את בוחרת בשקט נפשי." },
            { t: "בניית אמון", c: "הלקוחות שלנו חוזרים שוב ושוב כי הם יודעים שיש על מי לסמוך." },
            { t: "השמה ובנק משרות", c: "בקרוב - פתרונות תעסוקה בעולם האירועים והלוקיישנים." },
            { t: "מוצרי פרסום", c: "משלימים את החוויה עם מיתוג נכון ומדויק." },
            { t: "הזמן שלך יקר", c: "תני לנו לעשות את העבודה הקשה של הסינון עבורך." },
            { t: "החזון של ערדית בראון", c: "להוביל את עולם הלוקיישנים והאירועים בישראל." },
            { t: "כמעט שם...", c: "את מוכנה להפוך את החלום שלך למציאות?" },
            { t: "בואי נצא לדרך!", c: "השאירי פרטים עכשיו ונחזור אלייך עם הלוקיישן המושלם.", final: true }
        ];

        function init() {
            const container = document.getElementById('slidesContainer');
            const dots = document.getElementById('dotsContainer');

            steps.forEach((step, i) => {
                const slide = document.createElement('div');
                slide.className = `content-card ${i === 0 ? 'active' : ''}`;
                slide.innerHTML = `
                    <h2 class="text-3xl font-bold text-gray-900 mb-6 leading-[1.3]">${step.t}</h2>
                    <p class="text-xl text-gray-500 leading-relaxed font-light">${step.c}</p>
                    ${step.final ? `<button onclick="window.location.href='https://www.multibrawn.co.il/contact'" class="mt-12 w-full bg-pink-600 text-white py-5 rounded-2xl font-bold text-xl shadow-2xl hover:bg-pink-700 transition-all">דברו איתי עכשיו</button>` : ''}
                `;
                container.appendChild(slide);

                if (i % 5 === 0 || i === steps.length - 1) {
                    const dot = document.createElement('div');
                    dot.className = `progress-dot ${i === 0 ? 'active' : ''}`;
                    dot.id = `dot-${i}`;
                    dots.appendChild(dot);
                }
            });
            updateButtons();
        }

        function openGift() {
            document.getElementById('giftWrapper').classList.add('box-open');
            setTimeout(() => {
                document.getElementById('giftWrapper').style.display = 'none';
                const guide = document.getElementById('guideContent');
                guide.classList.remove('hidden');
                guide.classList.add('block');
            }, 700);
        }

        function nextStep() {
            if (currentStep < steps.length - 1) changeStep(currentStep + 1);
        }

        function prevStep() {
            if (currentStep > 0) changeStep(currentStep - 1);
        }

        function changeStep(newStep) {
            const slides = document.querySelectorAll('.content-card');
            slides[currentStep].classList.remove('active');
            currentStep = newStep;
            slides[currentStep].classList.add('active');
            updateButtons();
            updateDots();
        }

        function updateButtons() {
            document.getElementById('prevBtn').disabled = currentStep === 0;
            const nextBtn = document.getElementById('nextBtn');
            nextBtn.style.display = (currentStep === steps.length - 1) ? 'none' : 'flex';
        }

        function updateDots() {
            document.querySelectorAll('.progress-dot').forEach(dot => {
                const dotIdx = parseInt(dot.id.split('-')[1]);
                dot.classList.toggle('active', currentStep >= dotIdx);
            });
        }

        init();
    </script>
</body>
</html>
