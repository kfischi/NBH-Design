<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MULTI BRAWN – המדריך הדיגיטלי VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --pink:   #e91e63;
            --pink-d: #c2185b;
            --pink-l: #f48fb1;
            --gold:   #ffd700;
            --dark:   #0f0f0f;
            --card:   rgba(255,255,255,0.06);
        }

        html, body {
            height: 100%;
            font-family: 'Heebo', sans-serif;
            background: #0f0f0f;
            color: #fff;
            overflow: hidden;
        }

        /* ─── CANVAS PARTICLES ─── */
        #particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

        /* ─── SCREENS ─── */
        .screen {
            position: fixed; inset: 0; z-index: 10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 24px;
            transition: opacity 0.6s ease, transform 0.6s ease;
        }
        .screen.hidden { opacity: 0; pointer-events: none; transform: scale(1.04); }

        /* ─── INTRO SCREEN ─── */
        #introScreen { gap: 40px; }
        .logo-wrap { text-align: center; }
        .logo-wrap .brand {
            font-size: clamp(2rem, 7vw, 3rem);
            font-weight: 900;
            letter-spacing: 6px;
            background: linear-gradient(135deg, #fff 30%, var(--pink-l) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-wrap .sub {
            font-size: 11px;
            letter-spacing: 5px;
            color: var(--pink-l);
            font-weight: 700;
            margin-top: 4px;
        }

        /* gift */
        .gift-scene { perspective: 800px; cursor: pointer; }
        .gift-wrap {
            position: relative;
            width: 180px; height: 180px;
            transform-style: preserve-3d;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%,100% { transform: translateY(0) rotateY(-8deg); }
            50%      { transform: translateY(-14px) rotateY(8deg); }
        }
        .gift-body {
            width: 180px; height: 180px;
            background: linear-gradient(145deg, var(--pink) 0%, var(--pink-d) 100%);
            border-radius: 18px;
            box-shadow:
                0 30px 60px rgba(233,30,99,.45),
                inset 0 1px 0 rgba(255,255,255,.2);
            position: relative;
            overflow: hidden;
        }
        .gift-lid {
            position: absolute; top: -8px; left: -8px;
            width: 196px; height: 52px;
            background: linear-gradient(135deg, var(--pink-d), #880e4f);
            border-radius: 14px 14px 0 0;
            box-shadow: 0 4px 20px rgba(0,0,0,.3);
            transition: transform 0.9s cubic-bezier(.34,1.56,.64,1), opacity 0.5s;
            transform-origin: top center;
            z-index: 5;
        }
        .rib-v { position: absolute; left: 50%; transform: translateX(-50%); width: 32px; height: 100%; background: rgba(255,255,255,.9); }
        .rib-h { position: absolute; top: 50%; transform: translateY(-50%); width: 100%; height: 32px; background: rgba(255,255,255,.9); }
        .rib-bow {
            position: absolute; top: -38px; left: 50%; transform: translateX(-50%);
            z-index: 6;
        }
        .rib-bow::before, .rib-bow::after {
            content: '';
            position: absolute;
            width: 36px; height: 26px;
            background: rgba(255,255,255,.95);
            border-radius: 50% 50% 0 50%;
            top: 0;
        }
        .rib-bow::before { left: -34px; transform: rotate(-30deg); }
        .rib-bow::after  { left: 0;     transform: rotate(30deg) scaleX(-1); }

        .gift-glow {
            position: absolute; inset: -30px;
            background: radial-gradient(circle at 50% 50%, rgba(233,30,99,.3) 0%, transparent 70%);
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { opacity: .6; } 50% { opacity: 1; } }

        .tap-hint {
            color: rgba(255,255,255,.5);
            font-size: 15px;
            font-weight: 300;
            letter-spacing: 1px;
            animation: blink 1.8s ease-in-out infinite;
        }
        @keyframes blink { 0%,100% { opacity: .4; } 50% { opacity: 1; } }

        /* gift open animation */
        .gift-scene.opening .gift-lid { transform: translateY(-120px) rotateX(50deg); opacity: 0; }
        .gift-scene.opening .gift-wrap { animation: explode 0.7s forwards; }
        @keyframes explode {
            0%   { transform: scale(1); opacity: 1; }
            40%  { transform: scale(1.15); opacity: 1; }
            100% { transform: scale(0); opacity: 0; }
        }

        /* ─── GUIDE SCREEN ─── */
        #guideScreen { padding: 0; }

        .guide-inner {
            width: 100%; max-width: 420px;
            height: 100dvh;
            display: flex; flex-direction: column;
            padding: 28px 20px 24px;
            gap: 16px;
        }

        /* header */
        .g-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .g-brand { font-size: 18px; font-weight: 900; letter-spacing: 4px; color: #fff; }
        .g-vip {
            font-size: 9px; font-weight: 700; letter-spacing: 4px;
            color: var(--gold);
            background: rgba(255,215,0,.12);
            border: 1px solid rgba(255,215,0,.3);
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* progress bar */
        .progress-track {
            height: 3px;
            background: rgba(255,255,255,.1);
            border-radius: 4px;
            flex-shrink: 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--pink), var(--pink-l));
            border-radius: 4px;
            transition: width 0.5s cubic-bezier(.4,0,.2,1);
        }

        /* card */
        .card-viewport { flex: 1; position: relative; overflow: hidden; }
        .slide {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: center;
            padding: 32px 28px;
            background: rgba(255,255,255,.05);
            border: 1px solid rgba(255,255,255,.1);
            border-radius: 28px;
            backdrop-filter: blur(20px);
            transition: transform 0.45s cubic-bezier(.4,0,.2,1), opacity 0.45s ease;
            opacity: 0;
            transform: translateX(-40px);
            pointer-events: none;
        }
        .slide.active {
            opacity: 1;
            transform: translateX(0);
            pointer-events: all;
        }
        .slide.exit-left  { opacity: 0; transform: translateX(60px); }
        .slide.exit-right { opacity: 0; transform: translateX(-60px); }

        .slide-num {
            font-size: 11px; font-weight: 700; letter-spacing: 3px;
            color: var(--pink-l); margin-bottom: 20px;
            display: flex; align-items: center; gap: 8px;
        }
        .slide-num::after {
            content: ''; flex: 1; height: 1px;
            background: linear-gradient(90deg, rgba(244,143,177,.4), transparent);
        }

        .slide-icon {
            font-size: 52px; margin-bottom: 18px;
            line-height: 1;
            filter: drop-shadow(0 4px 12px rgba(233,30,99,.4));
        }

        .slide-title {
            font-size: clamp(1.5rem, 5vw, 2rem);
            font-weight: 900;
            line-height: 1.25;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 60%, var(--pink-l));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .slide-body {
            font-size: clamp(1rem, 3.5vw, 1.1rem);
            font-weight: 300;
            line-height: 1.75;
            color: rgba(255,255,255,.7);
        }

        /* highlights */
        .highlight-row {
            display: flex; gap: 12px; margin-top: 22px; flex-wrap: wrap;
        }
        .chip {
            background: rgba(233,30,99,.15);
            border: 1px solid rgba(233,30,99,.35);
            color: var(--pink-l);
            font-size: 13px; font-weight: 600;
            padding: 7px 14px; border-radius: 40px;
        }

        /* price slide */
        .price-box {
            background: linear-gradient(135deg, rgba(233,30,99,.2), rgba(194,24,91,.1));
            border: 1px solid rgba(233,30,99,.4);
            border-radius: 20px;
            padding: 22px; text-align: center; margin-top: 20px;
        }
        .price-label { font-size: 12px; font-weight: 700; letter-spacing: 3px; color: var(--pink-l); margin-bottom: 6px; }
        .price-value {
            font-size: 3.5rem; font-weight: 900; line-height: 1;
            background: linear-gradient(135deg, var(--pink-l), var(--gold));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .price-was {
            font-size: 13px; color: rgba(255,255,255,.35);
            text-decoration: line-through; margin-top: 4px;
        }
        .countdown-wrap { margin-top: 14px; }
        .countdown-label { font-size: 11px; color: rgba(255,255,255,.4); letter-spacing: 2px; margin-bottom: 8px; }
        .countdown { display: flex; justify-content: center; gap: 10px; }
        .cd-block {
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 10px; padding: 8px 12px; text-align: center; min-width: 52px;
        }
        .cd-num { font-size: 22px; font-weight: 900; color: #fff; display: block; line-height: 1; }
        .cd-unit { font-size: 9px; color: rgba(255,255,255,.4); letter-spacing: 1px; margin-top: 2px; }

        .cta-btn {
            display: block; width: 100%; margin-top: 24px;
            background: linear-gradient(135deg, var(--pink), var(--pink-d));
            color: #fff; font-size: 1.15rem; font-weight: 900;
            padding: 18px; border-radius: 18px;
            border: none; cursor: pointer;
            box-shadow: 0 12px 40px rgba(233,30,99,.5);
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 0.5px;
            animation: ctaPulse 2.5s ease-in-out infinite;
        }
        .cta-btn:active { transform: scale(.97); box-shadow: 0 6px 20px rgba(233,30,99,.4); }
        @keyframes ctaPulse {
            0%,100% { box-shadow: 0 12px 40px rgba(233,30,99,.5); }
            50%      { box-shadow: 0 16px 55px rgba(233,30,99,.75); }
        }

        /* bottom nav */
        .g-nav {
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .nav-btn {
            width: 52px; height: 52px; border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,.12);
            background: rgba(255,255,255,.06);
            color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, border-color 0.2s, opacity 0.2s, transform 0.15s;
            backdrop-filter: blur(10px);
        }
        .nav-btn:hover  { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.25); }
        .nav-btn:active { transform: scale(.9); }
        .nav-btn:disabled { opacity: 0.2; cursor: default; }
        .nav-btn.next-btn {
            background: var(--pink);
            border-color: var(--pink);
            width: 58px; height: 58px;
            box-shadow: 0 8px 24px rgba(233,30,99,.5);
        }
        .nav-btn.next-btn:hover { background: var(--pink-d); }

        .step-counter { font-size: 13px; color: rgba(255,255,255,.35); font-weight: 500; }

        /* ─── CONFETTI ─── */
        .confetti-piece {
            position: fixed; top: -10px;
            width: 9px; height: 9px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
            z-index: 999; pointer-events: none;
        }
        @keyframes confettiFall {
            0%   { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            80%  { opacity: 1; }
            100% { transform: translateY(110vh) rotate(720deg) scale(.5); opacity: 0; }
        }

        /* swipe hint */
        .swipe-hint {
            position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
            font-size: 11px; color: rgba(255,255,255,.25); letter-spacing: 2px;
            display: flex; align-items: center; gap: 6px;
            animation: blink 2s ease-in-out infinite;
        }
    </style>
</head>
<body>

<canvas id="particles"></canvas>

<!-- ═══ INTRO SCREEN ═══ -->
<div class="screen" id="introScreen">
    <div class="logo-wrap">
        <div class="brand">MULTI BRAWN</div>
        <div class="sub">EXCLUSIVE DIGITAL GUIDE</div>
    </div>

    <div class="gift-scene" id="giftScene" onclick="openGift()">
        <div class="gift-glow"></div>
        <div class="gift-wrap" id="giftWrap">
            <div class="gift-body">
                <div class="gift-lid">
                    <div class="rib-bow"></div>
                    <div class="rib-v"></div>
                </div>
                <div class="rib-v"></div>
                <div class="rib-h"></div>
            </div>
        </div>
    </div>

    <p class="tap-hint">✦ לחצי על המארז לחשיפת ההצעה ✦</p>
</div>

<!-- ═══ GUIDE SCREEN ═══ -->
<div class="screen hidden" id="guideScreen">
    <div class="guide-inner">

        <div class="g-header">
            <div class="g-brand">MULTI BRAWN</div>
            <div class="g-vip">V I P  O F F E R</div>
        </div>

        <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <div class="card-viewport" id="cardViewport">
            <!-- slides injected by JS -->
        </div>

        <div class="g-nav">
            <button class="nav-btn" id="prevBtn" onclick="prevStep()" disabled>
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m13 17-5-5 5-5"/>
                </svg>
            </button>
            <span class="step-counter" id="stepCounter">1 / 7</span>
            <button class="nav-btn next-btn" id="nextBtn" onclick="nextStep()">
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 5 5 5-5 5" transform="translate(0,1)"/>
                </svg>
            </button>
        </div>

    </div>
</div>

<script>
/* ═══════════════════════════════════════════
   PARTICLES
═══════════════════════════════════════════ */
(function(){
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    let W, H, pts = [];
    function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
    window.addEventListener('resize', resize);
    resize();
    for(let i=0;i<70;i++) pts.push({
        x: Math.random()*W, y: Math.random()*H,
        r: Math.random()*1.8+0.3,
        dx: (Math.random()-.5)*.3,
        dy: (Math.random()-.5)*.3,
        a: Math.random(),
        da: (Math.random()-.5)*.008
    });
    function draw(){
        ctx.clearRect(0,0,W,H);
        pts.forEach(p=>{
            p.x+=p.dx; p.y+=p.dy; p.a+=p.da;
            if(p.x<0||p.x>W) p.dx*=-1;
            if(p.y<0||p.y>H) p.dy*=-1;
            p.a=Math.max(0.05,Math.min(0.7,p.a));
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle=`rgba(233,30,99,${p.a})`;
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    draw();
})();

/* ═══════════════════════════════════════════
   SLIDES DATA
═══════════════════════════════════════════ */
const slides = [
    {
        num: '01',
        icon: '💎',
        title: 'ברוכה הבאה לעולם של MULTI BRAWN',
        body: 'עצרי לרגע. את עומדת לפתוח מדריך שנבנה בדם, זיעה וחמישה עשר שנה של ניסיון. זה לא עוד PDF. זה שקט נפשי.',
        chips: ['15 שנות ניסיון', '150+ לוקיישנים', 'ידע בלעדי']
    },
    {
        num: '02',
        icon: '⏰',
        title: 'כמה שעות בזבזת על חיפושים שלא הובילו לשום מקום?',
        body: 'גוגל, אינסטגרם, קבוצות פייסבוק... שאלות ללא תשובות. המידע הנכון לא נמצא שם. הוא נמצא כאן.',
        chips: ['אין יותר בלבול', 'הכל במקום אחד']
    },
    {
        num: '03',
        icon: '🗝️',
        title: 'הגישה שאין לאף אחד אחר',
        body: 'MULTI BRAWN מחזיקה ב"רשימת הזהב" – לוקיישנים שלא מפורסמים בשום פלטפורמה. וילות, צימרים, מקומות שכל חבר ישאל: "איך מצאת את זה?"',
        chips: ['לוקיישנים סודיים', 'VIP access']
    },
    {
        num: '04',
        icon: '👑',
        title: 'שבת חתן בסטנדרט שלא הכרת',
        body: 'כל המשפחה מרוכזת, כולם מרוצים, ואת... נהנית. לא מתרוצצת. כי כל הפרטים כבר סוכמו לפני שהגעת.',
        chips: ['חדרי יוקרה', 'קייטרינג VIP', 'צ\'ק ליסט מלא']
    },
    {
        num: '05',
        icon: '✨',
        title: 'מה בדיוק יש במדריך?',
        body: 'רשימת לוקיישנים סודית לפי אזורים ► צ\'ק ליסט שבת חתן מלא ► שאלות שחייבים לשאול ► טיפים שרק מבפנים.',
        chips: ['מיידי ל-WhatsApp', 'גישה לצמיתות']
    },
    {
        num: '06',
        icon: '🤍',
        title: 'ערדית בראון – האישה מאחורי הקסם',
        body: 'אחרי אלפי אירועים ולוקיישנים שנבדקו, ערדית בנתה מדריך שהיה רוצה שיהיה לה כשהתחילה. עכשיו הוא שלך.',
        chips: ['סיפור אמיתי', 'תוצאות אמיתיות']
    },
    {
        num: '07',
        icon: '🎁',
        title: 'ההצעה שלא תחזור',
        body: 'מארז הלוקיישנים המלא – הגישה המיידית שלך לכל הידע.',
        isPrice: true
    }
];

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let current = 0;
let countdownInterval;

/* ═══════════════════════════════════════════
   BUILD SLIDES
═══════════════════════════════════════════ */
function buildSlides(){
    const vp = document.getElementById('cardViewport');
    slides.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'slide' + (i === 0 ? ' active' : '');
        div.id = 'slide-' + i;

        if(s.isPrice){
            div.innerHTML = `
                <div class="slide-num">${s.num} <span>FINAL OFFER</span></div>
                <div class="slide-icon">${s.icon}</div>
                <div class="slide-title">${s.title}</div>
                <p class="slide-body">${s.body}</p>
                <div class="price-box">
                    <div class="price-label">מחיר השקה – 24 שעות בלבד</div>
                    <div class="price-value">₪199</div>
                    <div class="price-was">מחיר רגיל ₪450</div>
                    <div class="countdown-wrap">
                        <div class="countdown-label">ההצעה פוקעת בעוד</div>
                        <div class="countdown">
                            <div class="cd-block"><span class="cd-num" id="cdH">23</span><div class="cd-unit">שעות</div></div>
                            <div class="cd-block"><span class="cd-num" id="cdM">59</span><div class="cd-unit">דקות</div></div>
                            <div class="cd-block"><span class="cd-num" id="cdS">59</span><div class="cd-unit">שניות</div></div>
                        </div>
                    </div>
                </div>
                <button class="cta-btn" onclick="window.location.href='https://www.multibrawn.co.il/pay'">
                    אני רוצה את המדריך עכשיו! ←
                </button>
            `;
        } else {
            div.innerHTML = `
                <div class="slide-num">${s.num}</div>
                <div class="slide-icon">${s.icon}</div>
                <div class="slide-title">${s.title}</div>
                <p class="slide-body">${s.body}</p>
                ${s.chips ? `<div class="highlight-row">${s.chips.map(c=>`<span class="chip">${c}</span>`).join('')}</div>` : ''}
            `;
        }
        vp.appendChild(div);
    });
    updateUI();
}

/* ═══════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════ */
function goTo(next){
    if(next < 0 || next >= slides.length) return;
    const prev = current;
    current = next;

    const prevEl = document.getElementById('slide-' + prev);
    const nextEl = document.getElementById('slide-' + next);

    prevEl.classList.remove('active');
    prevEl.classList.add(next > prev ? 'exit-right' : 'exit-left');
    setTimeout(()=> prevEl.classList.remove('exit-right','exit-left'), 500);

    nextEl.classList.add('active');

    updateUI();

    if(slides[next].isPrice) startCountdown();
}

function nextStep(){ goTo(current + 1); }
function prevStep(){ goTo(current - 1); }

function updateUI(){
    const total = slides.length;
    document.getElementById('prevBtn').disabled = current === 0;
    const nb = document.getElementById('nextBtn');
    nb.style.display = current === total - 1 ? 'none' : 'flex';
    document.getElementById('stepCounter').textContent = `${current + 1} / ${total}`;
    document.getElementById('progressFill').style.width = `${((current + 1) / total) * 100}%`;
}

/* ═══════════════════════════════════════════
   COUNTDOWN
═══════════════════════════════════════════ */
function startCountdown(){
    if(countdownInterval) return;
    let total = 23*3600 + 59*60 + 59;
    countdownInterval = setInterval(()=>{
        if(total <= 0){ clearInterval(countdownInterval); return; }
        total--;
        const h = Math.floor(total/3600);
        const m = Math.floor((total%3600)/60);
        const s = total%60;
        document.getElementById('cdH').textContent = String(h).padStart(2,'0');
        document.getElementById('cdM').textContent = String(m).padStart(2,'0');
        document.getElementById('cdS').textContent = String(s).padStart(2,'0');
    }, 1000);
}

/* ═══════════════════════════════════════════
   SWIPE SUPPORT
═══════════════════════════════════════════ */
(function(){
    let startX = 0;
    const vp = document.getElementById('cardViewport');
    vp.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
    vp.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - startX;
        if(dx < -50) nextStep();
        else if(dx > 50) prevStep();
    }, { passive: true });
})();

/* ═══════════════════════════════════════════
   OPEN GIFT
═══════════════════════════════════════════ */
function openGift(){
    const scene = document.getElementById('giftScene');
    scene.classList.add('opening');
    scene.onclick = null;

    spawnConfetti();

    setTimeout(()=>{
        document.getElementById('introScreen').classList.add('hidden');
        document.getElementById('guideScreen').classList.remove('hidden');
    }, 750);
}

/* ═══════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════ */
function spawnConfetti(){
    const colors = ['#e91e63','#f48fb1','#ffd700','#ffffff','#c2185b','#ff80ab'];
    for(let i = 0; i < 80; i++){
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.cssText = `
            left: ${Math.random()*100}vw;
            background: ${colors[Math.floor(Math.random()*colors.length)]};
            width: ${Math.random()*10+5}px;
            height: ${Math.random()*10+5}px;
            border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
            animation-duration: ${Math.random()*2+1.5}s;
            animation-delay: ${Math.random()*0.5}s;
        `;
        document.body.appendChild(el);
        el.addEventListener('animationend', ()=> el.remove());
    }
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
buildSlides();
